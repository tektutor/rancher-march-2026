apiVersion: v1
kind: Namespace
metadata:
  name: fleet-cicd-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-fleet-test
  namespace: fleet-cicd-demo 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
